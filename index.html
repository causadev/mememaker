<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="src/output.css" rel="stylesheet">
  <title>MemeMaker</title>
</head>

<body class="bg-zinc-950 flex flex-col items-center justify-center h-screen">
  <h1 class="text-3xl font-bold text-center mb-5">
    MemeMaker
  </h1>


  <div class="flex gap-4">
    <div class="relative overflow-hidden">
      <img src="artworks-D0ZqXIygRxHr7b7Y-LKzWjA-t500x500.jpg" draggable="false" alt="meme">
      <div class="absolute top-2 flex justify-center items-center left-1/2 -translate-x-1/2 w-full">
        <p class="topText text-5xl font-semibold border w-fit"></p>
      </div>
      <div class="absolute bottom-2 flex justify-center items-center left-1/2 -translate-x-1/2 w-full">
        <p class="bottomText text-5xl font-semibold"></p>
      </div>
    </div>
    <div class="flex flex-col gap-4 py-4">
      <span contenteditable="" role="textbox"
        class="w-[28rem] bg-zinc-700 rounded-lg outline-none p-2 overflow-hidden text-wrap" data-top-text></span>
      <span contenteditable="" role="textbox"
        class="w-[28rem] bg-zinc-700 rounded-lg outline-none p-2 overflow-hidden text-wrap" data-bottom-text></span>
      <button class="px-9 py-2 bg-blue-500 rounded-lg hover:bg-blue-600 transition ease-in-out">Download</button>
    </div>
  </div>
  <script type="module" src="/main.js"></script>

</html>
